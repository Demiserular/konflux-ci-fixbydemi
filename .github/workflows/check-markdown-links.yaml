name: Check Markdown Links

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - README.md
      - CONTRIBUTING.md
      - RELEASE.md
      - operator/docs/content/**
  merge_group:
    types: [checks_requested]
    paths:
      - README.md
      - CONTRIBUTING.md
      - RELEASE.md
      - operator/docs/content/**
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .lychee.yml
            --exclude-mail
            --accept 429
            --max-retries 3
            --retry-wait-time 2
            README.md
            CONTRIBUTING.md
            RELEASE.md
            operator/docs/content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
